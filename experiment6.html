<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JavaScript Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 50px 60px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      max-width: 680px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 28px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 18px;
      border: 2px solid #c8d6e5;
      border-radius: 10px;
      font-size: 1rem;
      color: #555;
      outline: none;
      transition: border 0.3s;
      margin-bottom: 24px;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    button {
      padding: 11px 22px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      color: #fff;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    button:active { transform: scale(0.97); }

    #btn-heading   { background: linear-gradient(135deg, #667eea, #764ba2); }
    #btn-bg        { background: linear-gradient(135deg, #f093fb, #f5576c); }
    #btn-font      { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; }
    #btn-toggle    { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #fff; }
    #btn-reset     { background: linear-gradient(135deg, #fa709a, #fee140); }

    #para {
      margin-top: 28px;
      font-size: 1.05rem;
      color: #444;
      line-height: 1.6;
      transition: all 0.3s;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="heading">Welcome to JavaScript Lab</h1>

    <input type="text" id="newHeading" placeholder="Enter new heading text" />

    <div class="btn-row">
      <button id="btn-heading" onclick="changeHeading()">Change Heading</button>
      <button id="btn-bg"      onclick="changeBg()">Change Background</button>
      <button id="btn-font"    onclick="increaseFont()">Increase Font Size</button>
    </div>

    <div class="btn-row">
      <button id="btn-toggle" onclick="togglePara()">Show/Hide Paragraph</button>
      <button id="btn-reset"  onclick="resetAll()">Reset</button>
    </div>

    <p id="para">This is a sample paragraph. JavaScript events can dynamically change content.</p>
  </div>

  <script>
    const bgColors = [
      'linear-gradient(135deg,#e0eafc,#cfdef3)',
      'linear-gradient(135deg,#ffecd2,#fcb69f)',
      'linear-gradient(135deg,#a1c4fd,#c2e9fb)',
      'linear-gradient(135deg,#d4fc79,#96e6a1)',
      'linear-gradient(135deg,#fbc2eb,#a6c1ee)',
    ];
    let bgIndex = 0;
    let fontSize = 1.05;

    function changeHeading() {
      const val = document.getElementById('newHeading').value.trim();
      if (val) document.getElementById('heading').textContent = val;
    }

    function changeBg() {
      bgIndex = (bgIndex + 1) % bgColors.length;
      document.body.style.background = bgColors[bgIndex];
    }

    function increaseFont() {
      fontSize += 0.15;
      document.getElementById('para').style.fontSize = fontSize + 'rem';
    }

    function togglePara() {
      const p = document.getElementById('para');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function resetAll() {
      document.getElementById('heading').textContent = 'Welcome to JavaScript Lab';
      document.getElementById('newHeading').value = '';
      document.body.style.background = bgColors[0];
      bgIndex = 0;
      fontSize = 1.05;
      const p = document.getElementById('para');
      p.style.fontSize = '1.05rem';
      p.style.display = 'block';
    }
  </script>
</body>
</html>
